{% load blog_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<title>{% block title %}My Blog{% endblock %}</title>
<link href="{% static 'css/blog.css' %}" rel="stylesheet">
</head>
<body>
    <div id='sidebar'>
    <h2>My Blog </h2>
    <p>This is my blog</p>
    <p>I 've written {% total_posts %} posts so far. </p>
    </div>
    <div id='content'>
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
